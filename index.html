<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DiCA Gallery | TM LINK 디지털 명함 레퍼런스</title>
<meta name="description" content="TM LINK가 제작한 디지털 명함 포트폴리오. 실제 제작 사례를 확인하세요."/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #000000;
  --card: #141414;
  --card2: #1c1c1c;
  --border: #2a2a2a;
  --gold: #f2ca50;
  --gold2: #d4af37;
  --white: #e2e2e2;
  --muted: #888;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  vertical-align: middle;
}

/* HEADER */
header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 48px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 800; color: var(--gold); letter-spacing: 0.04em; text-decoration: none; }
.header-right { display: flex; align-items: center; gap: 16px; }
.back-btn {
  display: flex; align-items: center; gap: 6px;
  color: var(--muted); font-size: 13px;
  text-decoration: none; transition: color 0.2s;
}
.back-btn:hover { color: var(--gold); }
.count-badge {
  background: rgba(242,202,80,0.1);
  border: 1px solid rgba(242,202,80,0.3);
  color: var(--gold); font-size: 12px; font-weight: 600;
  padding: 4px 12px; border-radius: 20px;
}

/* HERO */
.gallery-hero {
  padding: 60px 48px 40px;
  text-align: center;
  background: radial-gradient(ellipse at top, rgba(242,202,80,0.06) 0%, transparent 60%);
}
.gallery-hero h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 800; letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.gallery-hero h1 span { color: var(--gold); }
.gallery-hero p { color: var(--muted); font-size: 15px; line-height: 1.7; }

/* FILTERS */
.filter-bar {
  padding: 0 48px 32px;
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.filter-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 6px; }
.filter-btn {
  padding: 7px 16px; border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; font-family: 'Inter', sans-serif;
}
.filter-btn:hover { border-color: var(--gold); color: var(--gold); }
.filter-btn.active { background: var(--gold); border-color: var(--gold); color: #000; }

/* SEARCH */
.search-wrap {
  padding: 0 48px 32px;
  display: flex; gap: 12px;
}
.search-input {
  flex: 1; max-width: 360px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px 10px 40px;
  color: var(--white); font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none; transition: border-color 0.2s;
  position: relative;
}
.search-input:focus { border-color: var(--gold); }
.search-wrap-inner { position: relative; flex: 1; max-width: 360px; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 18px; }

/* GRID */
.gallery-grid {
  padding: 0 48px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* CARD */
.dica-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
  text-decoration: none; color: inherit;
  display: block;
}
.dica-card:hover {
  border-color: var(--gold);
  transform: translateY(-8px);
  box-shadow: 0 20px 48px rgba(242,202,80,0.1);
}
.card-cover {
  height: 120px; position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.card-cover-char {
  font-family: 'Montserrat', sans-serif;
  font-size: 56px; font-weight: 800;
  opacity: 0.15; line-height: 1;
}
.card-tier-badge {
  position: absolute; top: 12px; right: 12px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; padding: 3px 10px;
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.8);
  backdrop-filter: blur(8px);
}
.card-chapter {
  position: absolute; bottom: 12px; left: 12px;
  font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
  color: var(--gold); opacity: 0.8;
}
.card-body { padding: 18px 20px 20px; }
.card-name { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 700; color: var(--white); }
.card-role { font-size: 11px; color: var(--gold); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.card-company { font-size: 13px; color: var(--muted); margin-top: 6px; }
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.card-category {
  font-size: 11px; padding: 3px 10px;
  background: rgba(242,202,80,0.08);
  border: 1px solid rgba(242,202,80,0.2);
  border-radius: 20px; color: var(--gold);
}
.card-link-icon { color: var(--muted); font-size: 18px; transition: color 0.2s; }
.dica-card:hover .card-link-icon { color: var(--gold); }

/* EMPTY */
.empty-state {
  grid-column: 1 / -1;
  text-align: center; padding: 80px 20px;
  color: var(--muted);
}
.empty-state .material-symbols-outlined { font-size: 48px; opacity: 0.3; display: block; margin-bottom: 16px; }

/* ADD CARD */
.add-card {
  background: transparent;
  border: 2px dashed var(--border);
  border-radius: 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; padding: 40px 20px;
  cursor: default; min-height: 220px;
  transition: border-color 0.2s;
}
.add-card:hover { border-color: rgba(242,202,80,0.3); }
.add-card .material-symbols-outlined { color: var(--border); font-size: 36px; }
.add-card p { color: var(--border); font-size: 12px; text-align: center; line-height: 1.6; }

/* COVER COLORS */
.cover-0 { background: linear-gradient(135deg, #1a1400, #2a2000); }
.cover-1 { background: linear-gradient(135deg, #0d1a1a, #1a2a2a); }
.cover-2 { background: linear-gradient(135deg, #1a0d1a, #2a1a2a); }
.cover-3 { background: linear-gradient(135deg, #0d1520, #1a2535); }
.cover-4 { background: linear-gradient(135deg, #1a1020, #2a1830); }
.cover-5 { background: linear-gradient(135deg, #1a0d0d, #2a1818); }
.cover-6 { background: linear-gradient(135deg, #0d1a0d, #1a2a1a); }

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 32px 48px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 16px;
}
footer .logo { font-size: 15px; }
footer p { font-size: 12px; color: var(--muted); }
footer a { color: var(--gold); text-decoration: none; font-size: 12px; }

/* MOBILE */
@media (max-width: 768px) {
  header { padding: 0 20px; }
  .gallery-hero { padding: 40px 20px 28px; }
  .filter-bar { padding: 0 20px 20px; }
  .search-wrap { padding: 0 20px 20px; }
  .gallery-grid { padding: 0 20px 60px; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .card-cover { height: 90px; }
  .card-cover-char { font-size: 40px; }
  .card-body { padding: 14px 14px 16px; }
  .card-name { font-size: 15px; }
  footer { padding: 24px 20px; flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="https://jinjjabg-hub.github.io/TM-LINK/">◆ TM LINK</a>
  <div class="header-right">
    <span class="count-badge" id="count-badge">0 cards</span>
    <a class="back-btn" href="https://jinjjabg-hub.github.io/TM-LINK/">
      <span class="material-symbols-outlined" style="font-size:18px;">arrow_back</span> 홈으로
    </a>
  </div>
</header>

<!-- HERO -->
<div class="gallery-hero">
  <h1>DiCA <span>Gallery</span></h1>
  <p>TM LINK가 제작한 디지털 명함 실제 사례 모음.<br/>클릭하면 실제 디지털 명함이 열립니다.</p>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-wrap-inner">
    <span class="material-symbols-outlined search-icon">search</span>
    <input class="search-input" id="search-input" type="text" placeholder="이름, 회사명으로 검색..."/>
  </div>
</div>

<!-- FILTERS -->
<div class="filter-bar">
  <span class="filter-label">필터</span>
  <button class="filter-btn active" data-filter="all">전체</button>
  <button class="filter-btn" data-filter="tier:basic">베이직</button>
  <button class="filter-btn" data-filter="tier:standard">스탠다드</button>
  <button class="filter-btn" data-filter="tier:premium">프리미엄</button>
  <span style="width:1px;height:16px;background:#2a2a2a;margin:0 4px;"></span>
  <button class="filter-btn" data-filter="chapter:BNI 파이오니어">파이오니어</button>
  <button class="filter-btn" data-filter="chapter:BNI 자이언츠">자이언츠</button>
  <span style="width:1px;height:16px;background:#2a2a2a;margin:0 4px;"></span>
  <button class="filter-btn" data-filter="category:뷰티">뷰티</button>
  <button class="filter-btn" data-filter="category:미디어">미디어</button>
  <button class="filter-btn" data-filter="category:디자인">디자인</button>
  <button class="filter-btn" data-filter="category:헬스">헬스</button>
  <button class="filter-btn" data-filter="category:컨설팅">컨설팅</button>
</div>

<!-- GRID -->
<div class="gallery-grid" id="gallery-grid"></div>

<!-- FOOTER -->
<footer>
  <a class="logo" href="https://jinjjabg-hub.github.io/TM-LINK/">◆ TM LINK</a>
  <p>© 2025 TM LINK · 송승훈 대표 · 디지털 명함 전문 제작</p>
  <a href="https://jinjjabg-hub.github.io/TM-LINK/#cta">제작 의뢰하기 →</a>
</footer>

<script>
let allCards = [];
let activeFilter = 'all';
let searchQuery = '';

// cards.json 로드
fetch('./cards.json')
  .then(r => r.json())
  .then(data => {
    allCards = data;
    render();
  })
  .catch(() => {
    // 로드 실패 시 기본 데이터 사용
    allCards = [
      {"name":"송승훈","company":"T.M Link","role":"대표","url":"https://jinjjabg-hub.github.io/BNI-PIONEER-cards/%EC%86%A1%EC%8A%B9%ED%9B%88/","tier":"standard","category":"컨설팅","chapter":"BNI 파이오니어"},
      {"name":"김지현","company":"감성온도","role":"대표","url":"https://jinjjabg-hub.github.io/BNI-PIONEER-cards/%EA%B9%80%EC%A7%80%ED%98%84/","tier":"standard","category":"기타","chapter":"BNI 파이오니어"},
      {"name":"이화춘","company":"뷰티랩","role":"원장","url":"https://jinjjabg-hub.github.io/BNI-PIONEER-cards/%EC%9D%B4%ED%99%94%EC%B6%98/","tier":"premium","category":"뷰티","chapter":"BNI 파이오니어"},
      {"name":"이서원","company":"웰슨트서원","role":"대표","url":"https://jinjjabg-hub.github.io/NAMECARD/%EC%9D%B4%EC%84%9C%EC%9B%90","tier":"premium","category":"헬스","chapter":"BNI 파이오니어"},
      {"name":"박성준","company":"엘로이미디어","role":"대표","url":"https://jinjjabg-hub.github.io/bni-giants/%EB%B0%95%EC%84%B1%EC%A4%80/index.html","tier":"standard","category":"미디어","chapter":"BNI 자이언츠"},
      {"name":"김준래","company":"무늬디자인","role":"대표","url":"https://jinjjabg-hub.github.io/bni-giants/%EA%B9%80%EC%A4%80%EB%9E%98/index.html","tier":"standard","category":"디자인","chapter":"BNI 자이언츠"}
    ];
    render();
  });

function render() {
  const grid = document.getElementById('gallery-grid');
  const q = searchQuery.toLowerCase();

  const filtered = allCards.filter(card => {
    const matchSearch = !q ||
      card.name.toLowerCase().includes(q) ||
      card.company.toLowerCase().includes(q) ||
      (card.role && card.role.toLowerCase().includes(q));

    const matchFilter = activeFilter === 'all' ||
      (activeFilter.startsWith('tier:') && card.tier === activeFilter.split(':')[1]) ||
      (activeFilter.startsWith('chapter:') && card.chapter === activeFilter.split(':')[1]) ||
      (activeFilter.startsWith('category:') && card.category === activeFilter.split(':')[1]);

    return matchSearch && matchFilter;
  });

  document.getElementById('count-badge').textContent = `${filtered.length} cards`;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <span class="material-symbols-outlined">search_off</span>
      <p>조건에 맞는 카드가 없습니다.</p>
    </div>`;
    return;
  }

  const tierLabel = { basic:'BASIC', standard:'STANDARD', premium:'PREMIUM', free:'FREE PRO', enterprise:'ENTERPRISE' };
  const colors = ['cover-0','cover-1','cover-2','cover-3','cover-4','cover-5','cover-6'];

  grid.innerHTML = filtered.map((card, i) => `
    <a class="dica-card" href="${card.url}" target="_blank">
      <div class="card-cover ${colors[i % colors.length]}">
        <div class="card-cover-char">${card.name.charAt(0)}</div>
        <span class="card-tier-badge">${tierLabel[card.tier] || card.tier}</span>
        ${card.chapter ? `<span class="card-chapter">${card.chapter}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-name">${card.name}</div>
        <div class="card-role">${card.role}</div>
        <div class="card-company">${card.company}</div>
        <div class="card-footer">
          <span class="card-category">${card.category}</span>
          <span class="material-symbols-outlined card-link-icon">open_in_new</span>
        </div>
      </div>
    </a>
  `).join('') + `
    <div class="add-card">
      <span class="material-symbols-outlined">add_circle</span>
      <p>새 카드 추가 시<br/>cards.json에<br/>한 줄 추가</p>
    </div>
  `;
}

// 필터
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.getAttribute('data-filter');
    render();
  });
});

// 검색
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});
</script>
</body>
</html>
